<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0F172A; color: #fff; padding: 20px; }
        .log-box { background: #1E293B; padding: 15px; border-radius: 10px; margin-top: 20px; font-family: monospace; font-size: 12px; white-space: pre-wrap; word-break: break-all; border: 1px solid #334155; }
        .success { color: #4ADE80; }
        .error { color: #F87171; }
        .info { color: #60A5FA; }
    </style>
</head>
<body>

    <h1 class="text-2xl font-bold mb-4">🛠️ وضع التشخيص (Debug Mode)</h1>
    
    <div id="status-card" class="bg-slate-800 p-4 rounded-xl mb-4">
        <p>حالة المصادقة: <span id="auth-status" class="font-bold">جاري الفحص...</span></p>
        <p>Parent ID: <span id="pid-display" class="text-gray-400">-</span></p>
        <p>Device ID: <span id="did-display" class="text-gray-400">-</span></p>
    </div>

    <button onclick="startFullDiagnosis()" class="w-full bg-blue-600 py-3 rounded-xl font-bold mb-4">تشغيل الفحص الشامل</button>
    
    <div class="log-box" id="log-container">في انتظار بدء الفحص...</div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyASBVIQ0AvrsLqAgbT9k6L7bCpZKoqdvjo",
            authDomain: "studio-7073076148-6afe0.firebaseapp.com",
            projectId: "studio-7073076148-6afe0",
            storageBucket: "studio-7073076148-6afe0.appspot.com",
            messagingSenderId: "787676787951",
            appId: "1:787676787951:android:78bb939f7ab24b0494171a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentConfig = { parentId: null, deviceId: null };

        function log(msg, type = 'info') {
            const container = document.getElementById('log-container');
            const time = new Date().toLocaleTimeString();
            let colorClass = 'text-gray-300';
            if(type === 'error') colorClass = 'error';
            if(type === 'success') colorClass = 'success';
            container.innerHTML += `<span class="${colorClass}">[${time}] ${msg}</span>\n`;
            container.scrollTop = container.scrollHeight;
            console.log(msg);
        }

        function updateStatus(id, val) { document.getElementById(id).innerText = val || 'غير موجود'; if(val) document.getElementById(id).classList.remove('text-gray-400'); }

        // This function is called by Kotlin
        window.onChildLinked = function(configJson){
            log('تم استقبال بيانات الربط من Kotlin.', 'success');
            try {
                currentConfig = JSON.parse(configJson);
                log(`Parent ID: ${currentConfig.parentId}`);
                log(`Device ID: ${currentConfig.deviceId}`);
                updateStatus('pid-display', currentConfig.parentId);
                updateStatus('did-display', currentConfig.deviceId);
                
                // Start listening immediately
                startListening();
            } catch(e) {
                log('خطأ في تحليل JSON: ' + e.message, 'error');
            }
        };
        
        window.showLoginScreen = function(){ log('Kotlin يقول: يجب تسجيل الدخول.', 'error'); document.getElementById('auth-status').innerText = "غير مسجل"; }
        window.onAuthSuccess = function(code){ log('Kotlin يقول: تم تسجيل الدخول. الكود: ' + code, 'success'); }
        window.onAuthError = function(msg){ log('Kotlin يقول: خطأ: ' + msg, 'error'); }

        function startFullDiagnosis() {
            document.getElementById('log-container').innerHTML = ''; // Clear log
            log('بدء الفحص الشامل...');
            
            // 1. Check Native Bridge
            if(typeof AndroidNative === 'undefined') {
                log('خطأ حرج: الجسر (AndroidNative) غير موجود! الكود البرمجي (Kotlin) غير متصل بالـ HTML.', 'error');
                return;
            } else {
                log('الجسر (AndroidNative) موجود.', 'success');
            }

            // 2. Ask Kotlin for status
            log('طلب حالة المستخدم من Kotlin...');
            AndroidNative.checkUserStatus();
        }

        function startListening() {
            if(!currentConfig.parentId || !currentConfig.deviceId) {
                log('لا يمكن البدء: البيانات ناقصة.', 'error');
                return;
            }

            log('جاري الاتصال بـ Firestore للمستمع الحي...');
            const ref = db.collection('parents').document(currentConfig.parentId)
                           .collection('children').document(currentConfig.deviceId);

            // Listen for Main Data (Battery/Location)
            ref.onSnapshot(doc => {
                if(doc.exists){
                    log('✅ تم العثور على المستند الرئيسي!', 'success');
                    const data = doc.data();
                    log(`   البطارية: ${data.battery_level}`);
                    log(`   الموقع: ${JSON.stringify(data.location)}`);
                    log(`   Online: ${data.is_online}`);
                } else {
                    log('❌ المستند غير موجود! تطبيق الطفل لم يكتب البيانات الأولية.', 'error');
                }
            }, error => {
                log('❌ خطأ في قراءة البيانات: ' + error.message, 'error');
                if(error.message.includes("PERMISSION_DENIED")) {
                   log('🔥 السبب: قواعد الأمان (Rules) تمنع القراءة. تأكد من أنك نشرت القواعد الجديدة.', 'error');
                }
            });
            
            // Check Logs
            checkCollection('social_logs', 'واتساب');
            checkCollection('notifications', 'إشعارات');
        }

        function checkCollection(name, label) {
            db.collection('parents').document(currentConfig.parentId)
              .collection('children').document(currentConfig.deviceId)
              .collection(name).limit(1).get().then(snap => {
                  if(snap.empty) log(`⚠️ ${label}: لا توجد بيانات.`);
                  else log(`✅ ${label}: يوجد ${snap.size} سجل.`, 'success');
              }).catch(err => log(`❌ ${label}: خطأ ${err.message}`, 'error'));
        }

        // Safety timeout
        setTimeout(() => {
            if(document.getElementById('pid-display').innerText === '-') {
               log('انتهى الوقت بدون استجابة من Kotlin. تأكد من الضغط على زر "تشغيل الفحص".', 'error');
            }
        }, 5000);

    </script>
</body>
</html>
