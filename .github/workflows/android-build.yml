name: Android CI Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # === 1. التحقق من ملفات الإعداد ===
    - name: Validate Configs
      run: |
        if [ ! -f settings.gradle ]; then
          echo "rootProject.name = 'AbuAlZahra-Parent'" > settings.gradle
          echo "include ':app'" >> settings.gradle
        fi
        if [ ! -f gradle.properties ]; then
          echo "org.gradle.jvmargs=-Xmx2048m" > gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
        fi

    # === 2. تثبيت Gradle وإنشاء Wrapper (هذه الخطوة يجب أن تكون أولاً) ===
    - name: Setup Gradle
      run: |
        curl -L https://services.gradle.org/distributions/gradle-8.5-bin.zip -o gradle-8.5-bin.zip
        unzip gradle-8.5-bin.zip
        export PATH=$PWD/gradle-8.5/bin:$PATH
        gradle wrapper
      
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    # === 3. بناء التطبيق ===
    - name: Build Debug APK
      run: ./gradlew :app:assembleDebug

    # === 4. إنشاء المفتاح والتوقيع واستخراج SHA-1 ===
    - name: Sign and Extract SHA-1
      run: |
        KEYSTORE_FILE=abuzahra-parent-key.jks
        APK_PATH=app/build/outputs/apk/debug/app-debug.apk
        
        # أ. إنشاء المفتاح إذا لم يكن موجوداً
        if [ ! -f "$KEYSTORE_FILE" ]; then
           echo "Generating NEW permanent keystore..."
           keytool -genkey -v -keystore $KEYSTORE_FILE -alias abuzahra -keyalg RSA -keysize 2048 -validity 10000 -storepass abuzahra123 -keypass abuzahra123 -dname "CN=AbuZahraParent, OU=Dev, O=AbuZahra, L=Riyadh, ST=SA, C=SA"
        else
           echo "Using EXISTING permanent keystore."
        fi

        # ب. التوقيع باستخدام أداة apksigner
        APK_SIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | sort -r | head -n 1)
        echo "Signing APK with apksigner at: $APK_SIGNER"
        $APK_SIGNER sign --ks $KEYSTORE_FILE --ks-key-alias abuzahra --ks-pass pass:abuzahra123 --key-pass pass:abuzahra123 $APK_PATH

        # ج. طباعة المفتاح
        echo "============================================================"
        echo "           🔥 FIREBASE SHA-1 KEY (PARENT APP) 🔥"
        echo "============================================================"
        echo "COPY THE LINE BELOW (The text after 'SHA1:')"
        echo "------------------------------------------------------------"
        keytool -list -v -keystore $KEYSTORE_FILE -alias abuzahra -storepass abuzahra123 | grep "SHA1:"
        echo "------------------------------------------------------------"
        echo "1. Go to Firebase Console -> Project Settings"
        echo "2. Select App (com.abuzahra.manager)"
        echo "3. Add Fingerprint -> Paste the key above."
        echo "============================================================"
      
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AbuAlZahra-Parent-App
        path: app/build/outputs/apk/debug/app-debug.apk
